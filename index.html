<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Settings Panel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="settings-card">
      <h1>Game Settings</h1>
      <h2> Audio</h2>
      <label> <input type="checkbox" />Sound Effects</label>
      <label> <input type="checkbox" />Background Music</label>
      <label> <input type="checkbox" />Voice Chat</label>
      <h2>Gameplay</h2>
      <label> <input type="checkbox" />Hard Mode</label>
      <label> <input type="checkbox" />Auto Save</label>
      <label> <input type="checkbox" />Show Subtitles</label>
     <h2>Display</h2>
      <label> <input type="checkbox" />Fullscreen</label>
      <label> <input type="checkbox" />Motion Blur</label>
      <label> <input type="checkbox" />Screen Shake</label>
        <h2>Accessibility</h2>
        <label> <input type="checkbox" />Colorblind Mode</label>
        <label> <input type="checkbox" />High Contrast UI</label>
    </div>
  </body>
</html>
